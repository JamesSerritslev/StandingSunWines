cription\\\":\\\"Custom crush winery, live music venue, and private event space in Buellton, California.\\\",\\\"address\\\":{\\\"@type\\\":\\\"PostalAddress\\\",\\\"streetAddress\\\":\\\"92 2nd Street\\\",\\\"addressLocality\\\":\\\"Buellton\\\",\\\"addressRegion\\\":\\\"CA\\\",\\\"postalCode\\\":\\\"93427\\\",\\\"addressCountry\\\":\\\"US\\\"}}\"}},\"$20\",\"$a2\",1],\"$La3\"]\n2c:D\"$a7\"\na9:T19d5,"])</script><script>self.__next_f.push([1,"\u003c!-- HERO --\u003e\n\u003csection class=\"hero\"\u003e\n  \u003cdiv class=\"hero-bg\"\u003e\u003c/div\u003e\n  \u003cdiv class=\"hero-content\"\u003e\n    \u003cimg class=\"hero-logo\" src=\"/images/ssw/ssw-d553bb7215e2dee2.png\" alt=\"Standing Sun Wines\"/\u003e\n    \u003cp class=\"hero-tagline\"\u003eWines · Music · Art\u003c/p\u003e\n    \u003cdiv class=\"hero-ctas\"\u003e\n      \u003ca href=\"#winemaker\" class=\"btn btn-primary\"\u003eWinemaker in Residence\u003c/a\u003e\n      \u003ca href=\"#events\" class=\"btn btn-outline\"\u003eStanding Sun Live\u003c/a\u003e\n      \u003ca href=\"#private\" class=\"btn btn-outline\"\u003ePrivate Events\u003c/a\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"hero-scroll\"\u003e\n    \u003cdiv class=\"scroll-line\"\u003e\u003c/div\u003e\n    \u003cspan\u003eDiscover\u003c/span\u003e\n  \u003c/div\u003e\n\u003c/section\u003e\n\n\u003c!-- ABOUT --\u003e\n\u003csection id=\"about\" style=\"background:#0e0d0c; padding:96px 48px; text-align:center;\"\u003e\n  \u003cp class=\"eyebrow\" style=\"text-align:center;\"\u003eAbout Us\u003c/p\u003e\n  \u003ch2 class=\"section-title\" style=\"text-align:center; margin-bottom:18px;\"\u003eStanding Sun \u003cem\u003eWines\u003c/em\u003e\u003c/h2\u003e\n  \u003cdiv class=\"hr\" style=\"margin:20px auto;\"\u003e\u003c/div\u003e\n  \u003cp class=\"body-text\" style=\"max-width:680px; margin:0 auto; text-align:center;\"\u003e\n    Standing Sun Wines is a custom crush winery and live event destination located at the gateway to the Santa Ynez Valley in Buellton, California. Founded on the belief that wine, art, and music belong together, we've built a space where the craft of winemaking lives alongside creative expression, a 4,000 square foot industrial winery that doubles as a concert hall, event venue, and community gathering place.\n  \u003c/p\u003e\n  \u003cbr/\u003e\n  \u003cp class=\"body-text\" style=\"max-width:680px; margin:0 auto; text-align:center;\"\u003e\n    Whether you're a winemaker looking for a world-class custom crush facility, a couple searching for a one-of-a-kind wedding venue, or a music lover seeking an intimate live experience, Standing Sun is your place in the valley.\n  \u003c/p\u003e\n\u003c/section\u003e\n\n\u003c!-- WHERE WINE MEETS ART --\u003e\n\u003csection class=\"about\" id=\"winery\"\u003e\n  \u003cdiv class=\"about-img\"\u003e\u003c/div\u003e\n  \u003cdiv class=\"about-text\"\u003e\n    \u003cp class=\"eyebrow\"\u003eBuellton, California\u003c/p\u003e\n    \u003ch2 class=\"section-title\"\u003eWhere Wine\u003cbr\u003eMeets \u003cem\u003eArt\u003c/em\u003e\u003c/h2\u003e\n    \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n    \u003cp class=\"body-text\"\u003eLocated at the gateway to Santa Ynez Valley, Standing Sun Wines is an industrial winery unlike any other. Stainless steel tanks, oak barrels, and original murals share a 4,000 square foot space that pulses with creative energy, a working winery that doubles as a live music venue and private event destination.\u003c/p\u003e\n    \u003cbr/\u003e\n    \u003cp class=\"body-text\"\u003eWe make wine here. We host concerts here. We celebrate weddings, corporate retreats, and milestone moments here. The barrels and tanks are never far from the table.\u003c/p\u003e\n  \u003c/div\u003e\n\u003c/section\u003e\n\n\u003c!-- WINEMAKER IN RESIDENCE --\u003e\n\u003csection class=\"winemaker\" id=\"winemaker\"\u003e\n  \u003cdiv class=\"winemaker-text\"\u003e\n    \u003cp class=\"eyebrow\"\u003eCustom Crush Program\u003c/p\u003e\n    \u003ch2 class=\"section-title\"\u003eWinemaker\u003cbr\u003e\u003cem\u003ein Residence\u003c/em\u003e\u003c/h2\u003e\n    \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n    \u003cp class=\"body-text\"\u003eStanding Sun Wines is a fully equipped custom crush facility actively accepting clients for our Winemaker in Residence program. Whether you're an established brand looking for production space or an aspiring winemaker ready to bring your vision to life, our winemaker works alongside you every step of the way.\u003c/p\u003e\n    \u003cbr/\u003e\n    \u003cp class=\"body-text\"\u003eFrom harvest through bottling, we provide the facility, equipment, and expertise, you bring the grapes and the dream.\u003c/p\u003e\n    \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n    \u003ca href=\"/winery\" class=\"btn btn-primary\" style=\"align-self:flex-start;\"\u003eLearn More\u003c/a\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"winemaker-img\"\u003e\u003c/div\u003e\n\u003c/section\u003e\n\n\u003c!-- STANDING SUN LIVE --\u003e\n\u003csection class=\"events\" id=\"events\"\u003e\n  \u003cdiv id=\"gallery\" class=\"events-header\"\u003e\n    \u003cp class=\"eyebrow\"\u003eStanding Sun Live\u003c/p\u003e\n    \u003ch2 class=\"section-title\" style=\"text-align:center;\"\u003eMusic at\u003cbr\u003e\u003cem\u003ethe Winery\u003c/em\u003e\u003c/h2\u003e\n    \u003cdiv class=\"hr\" style=\"margin:18px auto;\"\u003e\u003c/div\u003e\n    \u003cp class=\"body-text\"\u003eIntimate concerts in a 4,000 sq ft working winery, surrounded by barrels, tanks, and original art. There's no venue quite like it in the Santa Ynez Valley.\u003c/p\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"events-layout\"\u003e\n    \u003cdiv class=\"event-card\" onclick=\"window.location.href='/#events'\" style=\"cursor:pointer;\"\u003e\n      \u003cimg src=\"/images/ssw/ssw-a797a261eb289a92.jpg\" alt=\"Concert crowd at Standing Sun\"/\u003e\n      \u003cdiv class=\"event-overlay\"\u003e\n        \u003cdiv class=\"event-tag\"\u003eStanding Sun Live\u003c/div\u003e\n        \u003cdiv class=\"event-title\"\u003eMusic at the Winery\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003cdiv class=\"events-cta\"\u003e\n    \u003ca href=\"https://www.eventbrite.com/o/standing-sun-wines-121252721971\" target=\"_blank\" class=\"btn btn-primary\"\u003eSee Upcoming Events on Eventbrite\u003c/a\u003e\n  \u003c/div\u003e\n\u003c/section\u003e\n\n\u003c!-- PRIVATE EVENTS --\u003e\n\u003csection id=\"private\"\u003e\n  \u003cdiv class=\"private\"\u003e\n    \u003cdiv class=\"private-bg\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"private-content\"\u003e\n      \u003cp class=\"eyebrow\"\u003ePrivate Events\u003c/p\u003e\n      \u003ch2 class=\"section-title\"\u003eAn Unforgettable\u003cbr\u003e\u003cem\u003eSetting\u003c/em\u003e\u003c/h2\u003e\n      \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n      \u003cp class=\"body-text\"\u003eLocated at the gateway to Santa Ynez Valley in Buellton, CA, Standing Sun Wines offers an intimate, unique industrial venue for weddings, corporate retreats, and private events.\u003c/p\u003e\n      \u003cp class=\"private-quote\"\u003e\"This venue boasts a 4,000 square foot industrial winery, barrels, steel tanks, and modern art as the perfect backdrop for your private event.\"\u003c/p\u003e\n      \u003ca href=\"#contact\" class=\"btn btn-primary\"\u003eContact Us to Book\u003c/a\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n  \u003c/section\u003e\n\n\u003c!-- CONTACT --\u003e\n\u003csection class=\"contact\" id=\"contact\"\u003e\n  \u003cp class=\"eyebrow\" style=\"text-align:center;\"\u003eGet in Touch\u003c/p\u003e\n  \u003ch2 class=\"section-title\" style=\"text-align:center; margin-bottom:14px;\"\u003eLet's Make\u003cbr\u003e\u003cem\u003eSomething Together\u003c/em\u003e\u003c/h2\u003e\n  \u003cdiv class=\"hr\" style=\"margin:18px auto 36px;\"\u003e\u003c/div\u003e\n  \u003cform class=\"ssw-inquiry-form\" action=\"
