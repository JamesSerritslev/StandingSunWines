    \u003cdiv\u003e\u003cdiv class=\"stat-number\"\u003e2007\u003c/div\u003e\u003cdiv class=\"stat-label\"\u003eEst. Buellton, CA\u003c/div\u003e\u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003csection id=\"facility\" style=\"background:var(--void);\"\u003e\n  \u003cdiv class=\"facility\"\u003e\n    \u003cdiv class=\"facility-grid\"\u003e\n      \u003cdiv\u003e\n        \u003cp class=\"eyebrow\"\u003eThe Facility\u003c/p\u003e\n        \u003ch2 class=\"section-title\"\u003eIndustrial\u003cbr\u003e\u003cem\u003eby Design\u003c/em\u003e\u003c/h2\u003e\n        \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n        \u003cp class=\"body-text\"\u003eStanding Sun Wines occupies a 4,000 square foot industrial space in the heart of Buellton, California. Steel tanks, oak barrels, concrete floors, and original murals coexist in a setting that is at once a working winery and a living gallery.\u003c/p\u003e\n        \u003cbr/\u003e\n        \u003cp class=\"body-text\"\u003eThe facility is fully equipped for every stage of the winemaking process, from crush and fermentation through barrel aging, blending, and bottling. It is one of the most versatile custom crush operations in Santa Barbara County.\u003c/p\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"facility-img\"\u003e\n        \u003cimg src=\"/images/ssw/ssw-67c2bb35d829e300.jpg\" alt=\"Barrel room at Standing Sun Wines\"/\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"facility-grid reverse\" id=\"serious-wine\"\u003e\n      \u003cdiv\u003e\n        \u003cp class=\"eyebrow\"\u003eEquipment \u0026amp; Production\u003c/p\u003e\n        \u003ch2 class=\"section-title\"\u003eBuilt for\u003cbr\u003e\u003cem\u003eSerious Wine\u003c/em\u003e\u003c/h2\u003e\n        \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n        \u003cp class=\"body-text\"\u003eOur facility features state-of-the-art stainless steel fermentation tanks, temperature-controlled barrel storage, a full crush pad, and a dedicated bottling line, everything a serious winemaker needs to produce world-class wine from Santa Barbara County fruit.\u003c/p\u003e\n        \u003cbr/\u003e\n        \u003cp class=\"body-text\"\u003eBeyond the equipment, Standing Sun offers something no other facility can: an environment that inspires. The murals, the music, the community, it all feeds into the wine.\u003c/p\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"facility-img\"\u003e\n        \u003cimg src=\"/images/ssw/ssw-9b5f0aa1a151d4b4.jpg\" alt=\"Fermentation tanks at Standing Sun\"/\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv style=\"padding:0 80px 48px; text-align:center;\"\u003e\n    \u003ca href=\"/winery#facility\" class=\"btn btn-outline\"\u003eEquipment List\u003c/a\u003e\n  \u003c/div\u003e\n\u003c/section\u003e\n\n\u003csection id=\"winemaker\" class=\"wir\"\u003e\n  \n  \u003cdiv style=\"padding:80px 80px 0; max-width:1200px; margin:0 auto;\"\u003e\n    \u003cp class=\"eyebrow\"\u003eCustom Crush Program\u003c/p\u003e\n    \u003ch2 style=\"font-family:'Libre Baskerville',serif;font-size:clamp(32px,5vw,60px);font-weight:400;color:var(--cream);line-height:1.1;margin-bottom:8px;\"\u003eCurrent Winemakers\u003cbr\u003e\u003cem style=\"color:var(--hammock);\"\u003ein Residence\u003c/em\u003e\u003c/h2\u003e\n    \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n  \u003c/div\u003e\n  \u003c!-- Current Winemakers --\u003e\n  \u003cdiv style=\"padding:24px 80px 48px; max-width:1200px; margin:0 auto; display:flex; flex-direction:column; gap:12px;\"\u003e\n    \u003ca href=\"https://www.kleemeierwines.com\" target=\"_blank\" style=\"font-family:'Libre Baskerville',serif; font-size:18px; font-weight:400; color:var(--cream); text-decoration:none; border-bottom:1px solid rgba(182,86,39,0.4); padding-bottom:12px; display:inline-flex; align-items:center; gap:10px; width:fit-content; transition:color 0.2s;\"\u003e\n      Kleemeier Wines \u003cspan class=\"wir-external-mark\" aria-hidden=\"true\"\u003e\u003c/span\u003e\n    \u003c/a\u003e\n    \u003ca href=\"https://www.crawfordfamilywines.com\" target=\"_blank\" style=\"font-family:'Libre Baskerville',serif; font-size:18px; font-weight:400; color:var(--cream); text-decoration:none; border-bottom:1px solid rgba(182,86,39,0.4); padding-bottom:12px; display:inline-flex; align-items:center; gap:10px; width:fit-content; transition:color 0.2s;\"\u003e\n      Crawford Family Wines \u003cspan class=\"wir-external-mark\" aria-hidden=\"true\"\u003e\u003c/span\u003e\n    \u003c/a\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"wir-body\"\u003e\n    \u003cdiv\u003e\n      \u003ch3 class=\"section-title\" style=\"font-size:clamp(20px,2.8vw,32px);\"\u003eYour Wine,\u003cbr\u003e\u003cem\u003eOur Facility\u003c/em\u003e\u003c/h3\u003e\n      \u003cdiv class=\"hr\"\u003e\u003c/div\u003e\n      \u003cp class=\"body-text\"\u003eStanding Sun Wines is a fully equipped custom crush facility actively accepting clients for our Winemaker in Residence program. Whether you're an established label looking for production space or an aspiring winemaker ready to bring your vision to life, we work alongside you every step of the way.\u003c/p\u003e\n      \u003cbr/\u003e\n      \u003cp class=\"body-text\"\u003eFrom harvest through bottling, we provide the facility, the equipment, and the expertise. You bring the grapes and the dream.\u003c/p\u003e\n      \u003cdiv style=\"margin-top:36px;\"\u003e\n        \u003cp class=\"eyebrow\"\u003eWhat's Included\u003c/p\u003e\n        \u003cdiv class=\"includes-grid\"\u003e\n          \u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eFull crush pad access\u003c/span\u003e\u003c/div\u003e\n\u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eStainless steel fermentation tanks\u003c/span\u003e\u003c/div\u003e\n\u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eTemperature-controlled barrel storage\u003c/span\u003e\u003c/div\u003e\n\u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eBlending \u0026amp; lab support\u003c/span\u003e\u003c/div\u003e\n\u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eBottling line access\u003c/span\u003e\u003c/div\u003e\n\u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eWinemaker consultation\u003c/span\u003e\u003c/div\u003e\n\u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eLabeling \u0026amp; compliance guidance\u003c/span\u003e\u003c/div\u003e\n\u003cdiv class=\"include-item\"\u003e\u003cdiv class=\"include-dot\"\u003e\u003c/div\u003e\u003cspan class=\"include-text\"\u003eSanta Barbara County sourcing connections\u003c/span\u003e\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"inquiry-form\" id=\"inquiry\"\u003e\n      \u003cform class=\"ssw-inquiry-form\" action=\"#\" method=\"post\"\u003e\n      \u003cinput type=\"hidden\" name=\"access_key\" value=\"d285445e-1bf2-424e-987a-e14eec9c02b6\"\u003e\n      \u003cinput type=\"hidden\" name=\"subject\" value=\"🍇 Custom Crush / Winemaker in Residence Inquiry, Standing Sun\"\u003e\n      \u003cinput type=\"hidden\" name=\"from_name\" value=\"Standing Sun, Winery\"\u003e\n      \u003cinput type=\"hidden\" name=\"replyto\" value=\"email\"\u003e\n      \u003cinput type=\"checkbox\" name=\"botcheck\" style=\"display:none;\"\u003e\n      \n      \u003ch3\u003eInquire About Availability\u003c/h3\u003e\n      \u003cp\u003eTell us about your project and we'll be in touch within 48 hours.\u003c/p\u003e\n      \u003cdiv class=\"form-row\"\u003e\n        \u003cdiv class=\"form-field\"\u003e\u003cinput type=\"text\" name=\"first_name\" placeholder=\"First Name\"/\u003e\u003c/div\u003e\n        \u003cdiv class=\"form-field\"\u003e\u003cinput type=\"text\" name=\"last_name\" placeholder=\"Last Name\"/\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-field\"\u003e\u003cinput type=\"email\" name=\"email\" placeholder=\"Email Address\"/\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-field\"\u003e\u003cinput type=\"tel\" name=\"phone\" placeholder=\"Phone Number\"/\u003e\u003c/div\u003e\n      \u003cdiv class=\"form-field\"\u003e\n        \u003cselect name=\"winemaker_type\"\u003e\n          \u003coption value=\"\"\u003eI am a...\u003c/option\u003e\n          \u003coption\u003eFirst-time winemaker\u003c/option\u003e\n          \u003coption\u003eEstablished wine brand\u003c/option\u003e\n          \u003coption\u003eHobbyist / home winemaker\u003c/option\u003e\n          \u003coption\u003eLooking to start a label\u003c/option\u003e\n        \u003c/select\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-field\"\u003e\n        \u003cselect name=\"annual_production\"\u003e\n          \u003coption value=\"\"\u003eEstimated annual production\u003c/option\u003e\n          \u003coption\u003eUnder 100 cases\u003c/option\u003e\n          \u003coption\u003e100–500 cases\u003c/option\u003e\n          \u003coption\u003e500–1,000 cases\u003c/option\u003e\n          \u003coption\u003e1,000+ cases\u003c/option\u003e\n        \u003c/select\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-field\"\u003e\u003ctextarea name=\"message\" placeholder=\"Tell us about your project, varietals of interest, and timeline...\" rows=\"5\"\u003e\u003c/textarea\u003e\u003c/div\u003e\n      \u003cbutton type=\"submit\" class=\"btn btn-primary\" style=\"width:100%;margin-top:4px;\"\u003eSend Inquiry\
